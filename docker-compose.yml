
version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: glasgow_traders
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5433:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  airflow:
    image: apache/airflow:2.9.0
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline:Glasgow190@postgres/glasgow_traders
    ports: ["8080:8080"]
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on: [postgres, redis]
    command: standalone

volumes:
  postgres_data:

